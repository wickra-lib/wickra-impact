# cargo-deny configuration — supply-chain gate (advisories, licenses, bans, sources).

[advisories]
version = 2
yanked = "deny"
# Suppressed advisories (assessed as not affecting wickra-impact). Keep in
# lock-step with osv-scanner.toml.
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal path dependencies (the binding crates depend on impact-core by path)
# carry an explicit version, so they are not wildcard paths.

[sources]
unknown-registry = "deny"
unknown-git = "deny"

# `wickra-backtest` (the StrategySpec SSOT + backtest engine embedded in
# generated projects) is consumed as a git dependency until its first crates.io
# release; it lives under the project's own GitHub org.
[sources.allow-org]
github = ["wickra-lib"]
